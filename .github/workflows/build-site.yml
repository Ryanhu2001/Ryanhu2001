name: Build public site

on:
  push:
    branches:
      - main
    paths:
      - "**.md"
      - "assets/**"
      - "site/**"
      - "scripts/build-wiki.mjs"
      - ".github/workflows/build-site.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-public-site
  cancel-in-progress: true

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[skip site]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/build-wiki.mjs
      - name: Commit generated docs
        run: |
          if git diff --quiet -- docs; then
            echo "No generated site changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "build: update public site [skip site]"
          git push
