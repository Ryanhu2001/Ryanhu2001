    <script>
        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, {
              delimiters: [
                  {left: '$$', right: '$$', display: true},
                  {left: '\\[', right: '\\]', display: true},
                  {left: '$', right: '$', display: false},
                  {left: '\\(', right: '\\)', display: false}
              ],
              throwOnError : false
            });
            

            var siteSearchModal = document.getElementById("siteSearchModal");
            var siteSearchBox = siteSearchModal ? siteSearchModal.querySelector("pagefind-searchbox") : null;
            function focusSiteSearch() {
                window.setTimeout(function() {
                    if (siteSearchBox && typeof siteSearchBox.focus === "function") {
                        siteSearchBox.focus();
                    }
                }, 80);
            }
            if (siteSearchModal && window.jQuery) {
                window.jQuery(siteSearchModal).on("shown.bs.modal", focusSiteSearch);
            }
            document.addEventListener("keydown", function(event) {
                var key = String(event.key || "").toLowerCase();
                var isSearchShortcut = key === "k" && (event.metaKey || event.ctrlKey);
                var isModalOpen = siteSearchModal && siteSearchModal.classList.contains("show");
                var target = event.target;
                var isTyping = target && (
                    target.tagName === "INPUT" ||
                    target.tagName === "TEXTAREA" ||
                    target.isContentEditable
                );
                if (!isSearchShortcut || (isTyping && isModalOpen) || !siteSearchModal || !window.jQuery) return;
                event.preventDefault();
                window.jQuery(siteSearchModal).modal("show");
            });
        });
    </script>
