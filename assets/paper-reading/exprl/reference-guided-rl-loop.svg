<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" role="img" aria-labelledby="title desc">
  <title id="title">ExpRL reference-guided RL loop</title>
  <desc id="desc">A self-made diagram showing how ExpRL keeps the reference solution hidden from the policy but uses it to guide dense reward judgment for on-policy rollouts.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#4f5f66"/></marker>
    <style>
      .bg { fill: #fbf6ea; }
      .box { fill: #fffaf0; stroke: #b89a62; stroke-width: 2; rx: 18; }
      .box2 { fill: #f6f8fb; stroke: #7893b0; stroke-width: 2; rx: 18; }
      .box3 { fill: #f7fbf7; stroke: #6f9b7b; stroke-width: 2; rx: 18; }
      .text { fill: #1f2428; font-family: Inter, Arial, sans-serif; font-size: 24px; font-weight: 700; }
      .small { fill: #4f5459; font-family: Inter, Arial, sans-serif; font-size: 16px; font-weight: 500; }
      .line { stroke: #4f5f66; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .hidden { stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="520"/>
  <text class="text" x="56" y="62">ExpRL: use reference as reward scaffolding, not imitation target</text>
  <text class="small" x="56" y="94">The actor stays on-policy; the reference only helps the judge measure partial progress.</text>

  <rect class="box" x="70" y="185" width="205" height="120"/>
  <text class="text" x="108" y="230">Problem x</text>
  <text class="small" x="108" y="260">hard reasoning task</text>

  <rect class="box2" x="345" y="160" width="230" height="165"/>
  <text class="text" x="381" y="205">Policy rollout</text>
  <text class="small" x="381" y="236">sample reasoning trace</text>
  <text class="small" x="381" y="262">no reference visible</text>

  <rect class="box" x="675" y="110" width="260" height="120"/>
  <text class="text" x="715" y="154">Reference y*</text>
  <text class="small" x="715" y="185">hidden from actor</text>

  <rect class="box3" x="675" y="300" width="260" height="130"/>
  <text class="text" x="715" y="345">LLM judge</text>
  <text class="small" x="715" y="376">rubric + 1..5 progress</text>
  <text class="small" x="715" y="400">dense reward for RL</text>

  <path class="line" d="M275 245 H337"/>
  <path class="line" d="M575 245 C620 245 640 352 667 365"/>
  <path class="line hidden" d="M805 230 V292"/>
  <path class="line" d="M675 365 C560 455 420 425 430 334"/>
  <text class="small" x="680" y="258">reference path is hidden from policy</text>
</svg>
