<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="430" viewBox="0 0 1080 430" role="img" aria-labelledby="title desc">
  <title id="title">AutoBench Agentic April 2026 result reading guide</title>
  <desc id="desc">A compact summary of the AutoBench Agentic April 2026 reported results.</desc>
  <defs>
    <style>
      .bg { fill: #fbf6ea; }
      .card { fill: #fffaf0; stroke: #dfc7a5; stroke-width: 1.5; }
      .track { fill: #ead6b9; }
      .bar { fill: #a96f2a; }
      .bar2 { fill: #c08a41; }
      .text { font-family: Inter, "Noto Sans SC", Arial, sans-serif; fill: #2d261f; }
      .title { font-size: 30px; font-weight: 800; }
      .mid { font-size: 22px; font-weight: 750; }
      .small { font-size: 17px; }
      .num { font-size: 34px; font-weight: 850; fill: #7a4c1e; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="430"/>
  <text x="56" y="58" class="text title">April 2026 run：当前 agentic benchmark 远未饱和</text>
  <text x="56" y="90" class="text small">来源是 AutoBench blog 公告。这里把最该记的数字抽成“读结果的坐标系”。</text>

  <rect x="56" y="126" width="306" height="236" rx="12" class="card"/>
  <text x="84" y="166" class="text mid">整体分数区间</text>
  <rect x="84" y="200" width="240" height="24" rx="12" class="track"/>
  <rect x="84" y="200" width="158" height="24" rx="12" class="bar"/>
  <text x="84" y="258" class="text num">2.2 到 3.3 / 5</text>
  <text x="84" y="302" class="text small">3 是“good”，4 才是 robust/efficient。</text>
  <text x="84" y="330" class="text small">这说明榜单并没有接近 90% 饱和叙事。</text>

  <rect x="388" y="126" width="306" height="236" rx="12" class="card"/>
  <text x="416" y="166" class="text mid">最高分</text>
  <text x="416" y="222" class="text num">Claude Opus 4.7</text>
  <text x="416" y="264" class="text mid">3.295</text>
  <text x="416" y="302" class="text small">强在多步编排、工具过滤、复杂参数映射。</text>
  <text x="416" y="330" class="text small">紧随其后：Claude Opus 4.6、Gemini 3.1 Pro preview。</text>

  <rect x="720" y="126" width="304" height="236" rx="12" class="card"/>
  <text x="748" y="166" class="text mid">成本曲线</text>
  <text x="748" y="222" class="text num">GLM-5.1</text>
  <text x="748" y="264" class="text mid">3.148, USD 0.005/run</text>
  <text x="748" y="302" class="text small">接近重模型分数，但成本约为 Claude Opus 4.6 的 1/5。</text>
  <text x="748" y="330" class="text small">适合高吞吐 agent pipeline 的候选。</text>

  <text x="56" y="396" class="text small">额外注意：Parameter Complexity 没有模型平均达到 3；OpenAI 模型在该 run 中有 27% 到 47% responses 触发 refusal，排名要谨慎读。</text>
</svg>
