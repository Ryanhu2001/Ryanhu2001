<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc">
  <title id="title">Anthropic RSI, loops, and Managed Agents map</title>
  <desc id="desc">A diagram connecting AI-driven AI research acceleration, loop primitives, managed agent infrastructure, and human judgment.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#76614a"/>
    </marker>
    <style>
      .bg { fill: #fbf6ea; }
      .panel { fill: #fffaf0; stroke: #dfd1bc; stroke-width: 2; rx: 18; }
      .soft { fill: #f3ead8; stroke: #d8c8b1; stroke-width: 1.5; rx: 14; }
      .deep { fill: #e9dac2; stroke: #c8b49a; stroke-width: 1.5; rx: 14; }
      .line { stroke: #76614a; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #a58d70; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .title { font: 700 30px Inter, Arial, sans-serif; fill: #2f2923; }
      .h { font: 700 20px Inter, Arial, sans-serif; fill: #342d26; }
      .t { font: 500 15px Inter, Arial, sans-serif; fill: #443b33; }
      .s { font: 400 13px Inter, Arial, sans-serif; fill: #6a5b4b; }
      .mono { font: 600 13px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #4a3d31; }
      .tag { fill: #dac5a6; rx: 10; }
    </style>
  </defs>

  <rect class="bg" width="1100" height="720"/>
  <text x="60" y="62" class="title">从 RSI 压力到可生产的 agent runtime</text>
  <text x="60" y="92" class="s">三篇文章串起来看：能力进步不是凭空发生，而是被循环、环境、日志、权限和人类 judgment 共同放大。</text>

  <rect x="60" y="135" width="290" height="430" class="panel"/>
  <text x="88" y="174" class="h">1. RSI 压力</text>
  <text x="88" y="205" class="t">AI 正在压缩 AI R&amp;D 里的</text>
  <text x="88" y="229" class="t">执行时间：写代码、跑实验、</text>
  <text x="88" y="253" class="t">复现实验、找 bug。</text>
  <rect x="88" y="287" width="222" height="54" class="soft"/>
  <text x="107" y="309" class="mono">doing becomes cheap</text>
  <text x="107" y="329" class="s">人类时间里的执行成本下降</text>
  <rect x="88" y="365" width="222" height="66" class="soft"/>
  <text x="107" y="388" class="mono">bottleneck shifts</text>
  <text x="107" y="409" class="s">瓶颈转向选题、验证、审查</text>
  <rect x="88" y="455" width="222" height="54" class="deep"/>
  <text x="107" y="477" class="mono">closing the loop?</text>
  <text x="107" y="497" class="s">未来可能走向模型自举</text>

  <rect x="405" y="135" width="290" height="430" class="panel"/>
  <text x="433" y="174" class="h">2. Loop 原语</text>
  <text x="433" y="205" class="t">把“会做事的模型”变成</text>
  <text x="433" y="229" class="t">可触发、可停止、可验证的</text>
  <text x="433" y="253" class="t">工作循环。</text>
  <rect x="433" y="286" width="110" height="50" class="soft"/>
  <text x="454" y="316" class="mono">trigger</text>
  <rect x="560" y="286" width="110" height="50" class="soft"/>
  <text x="584" y="316" class="mono">work</text>
  <rect x="560" y="362" width="110" height="50" class="soft"/>
  <text x="580" y="392" class="mono">verify</text>
  <rect x="433" y="362" width="110" height="50" class="soft"/>
  <text x="460" y="392" class="mono">stop</text>
  <path d="M 543 311 L 555 311" class="thin"/>
  <path d="M 615 336 L 615 356" class="thin"/>
  <path d="M 560 387 L 548 387" class="thin"/>
  <path d="M 488 362 L 488 342" class="thin"/>
  <rect x="433" y="455" width="237" height="54" class="deep"/>
  <text x="452" y="477" class="mono">/goal /loop /schedule</text>
  <text x="452" y="497" class="s">用不同原语交出 check、stop、trigger 或 prompt</text>

  <rect x="750" y="135" width="290" height="430" class="panel"/>
  <text x="778" y="174" class="h">3. Managed Agents</text>
  <text x="778" y="205" class="t">把 loop 放进生产基础设施：</text>
  <text x="778" y="229" class="t">sandbox、vault、session log、</text>
  <text x="778" y="253" class="t">observability 和 resume。</text>
  <rect x="778" y="285" width="105" height="58" class="soft"/>
  <text x="803" y="310" class="mono">agent</text>
  <text x="800" y="329" class="s">prompt/tools</text>
  <rect x="906" y="285" width="105" height="58" class="soft"/>
  <text x="920" y="310" class="mono">session</text>
  <text x="921" y="329" class="s">event log</text>
  <rect x="778" y="370" width="105" height="58" class="soft"/>
  <text x="789" y="395" class="mono">sandbox</text>
  <text x="797" y="414" class="s">hands</text>
  <rect x="906" y="370" width="105" height="58" class="soft"/>
  <text x="934" y="395" class="mono">vault</text>
  <text x="922" y="414" class="s">credentials</text>
  <rect x="778" y="455" width="233" height="54" class="deep"/>
  <text x="797" y="477" class="mono">brain != hands</text>
  <text x="797" y="497" class="s">推理和代码执行解耦，历史可恢复可审计</text>

  <path d="M 350 350 C 372 350 382 350 405 350" class="line"/>
  <path d="M 695 350 C 717 350 727 350 750 350" class="line"/>

  <rect x="202" y="600" width="695" height="72" class="soft"/>
  <text x="228" y="628" class="h">人类现在最值钱的部分</text>
  <text x="228" y="655" class="t">taste：选什么问题、信什么结果、哪里该停、哪条失败值得写进系统。</text>
  <path d="M 550 565 L 550 594" class="line"/>
</svg>
