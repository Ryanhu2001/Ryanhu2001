<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">LLM-as-Environment-Engineer closed loop</title>
  <desc id="desc">A closed-loop RL pipeline where the current policy is trained, evaluated, and then used to redesign the next environment configuration.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7a5c2f"/>
    </marker>
    <style>
      .bg { fill: #fbf6ea; }
      .panel { fill: #fffaf1; stroke: #d8c8ad; stroke-width: 2; rx: 12; }
      .soft { fill: #f3ead8; stroke: #d8c8ad; stroke-width: 2; rx: 12; }
      .accent { fill: #b8843a; }
      .text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2d261c; }
      .label { font-size: 22px; font-weight: 700; }
      .small { font-size: 16px; fill: #5f5240; }
      .tiny { font-size: 13px; fill: #6c5f4d; }
      .line { stroke: #7a5c2f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #b99d70; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1120" height="560"/>

  <rect class="panel" x="52" y="70" width="250" height="150"/>
  <text class="text label" x="82" y="116">Environment</text>
  <text class="text label" x="82" y="145">generator</text>
  <text class="text small" x="82" y="178">C_n = data ratio, holes,</text>
  <text class="text small" x="82" y="201">wait-conflict ratio</text>

  <rect class="panel" x="435" y="70" width="250" height="150"/>
  <text class="text label" x="469" y="116">GRPO training</text>
  <text class="text small" x="469" y="154">sample MAPF-FrozenLake</text>
  <text class="text small" x="469" y="178">instances from C_n</text>
  <text class="text tiny" x="469" y="204">reward = validity + length</text>

  <rect class="panel" x="818" y="70" width="250" height="150"/>
  <text class="text label" x="854" y="116">Validation</text>
  <text class="text small" x="854" y="154">held-out maps</text>
  <text class="text small" x="854" y="178">failure breakdown</text>
  <text class="text tiny" x="854" y="204">valid rate, optimal rate</text>

  <rect class="soft" x="435" y="332" width="250" height="150"/>
  <text class="text label" x="462" y="378">Environment</text>
  <text class="text label" x="462" y="407">engineer</text>
  <text class="text small" x="462" y="440">current RL checkpoint</text>
  <text class="text tiny" x="462" y="463">not the frozen base model</text>

  <rect class="soft" x="70" y="332" width="250" height="150"/>
  <text class="text label" x="102" y="378">Context</text>
  <text class="text small" x="102" y="412">failure evidence</text>
  <text class="text small" x="102" y="436">history + bookkeeping</text>
  <text class="text tiny" x="102" y="460">avoid overloading RL details</text>

  <rect class="soft" x="800" y="332" width="250" height="150"/>
  <text class="text label" x="834" y="378">New config</text>
  <text class="text small" x="834" y="412">target weak map sizes</text>
  <text class="text small" x="834" y="436">preserve useful regions</text>
  <text class="text tiny" x="834" y="460">project to legal generator params</text>

  <path class="line" d="M302 145 H435"/>
  <path class="line" d="M685 145 H818"/>
  <path class="line" d="M943 220 C943 270, 805 288, 685 360"/>
  <path class="line" d="M435 407 H320"/>
  <path class="line" d="M685 407 H800"/>
  <path class="line" d="M800 407 C620 530, 190 520, 178 220"/>

  <path class="dash" d="M560 332 V220"/>
  <text class="text tiny" x="586" y="284">trained policy becomes the designer</text>

  <circle class="accent" cx="52" cy="70" r="7"/>
  <circle class="accent" cx="435" cy="70" r="7"/>
  <circle class="accent" cx="818" cy="70" r="7"/>
  <text class="text small" x="412" y="526">Core idea: train -> evaluate failures -> let the current checkpoint design the next environment distribution.</text>
</svg>
